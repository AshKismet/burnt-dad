<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Burnt Dad - AI Recipes for Exhausted Parents</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #1a0800 0%, #2d1400 100%);
            font-family: 'Press Start 2P', monospace;
            color: #fff;
            min-height: 100vh;
            padding: 20px;
            overflow-x: hidden;
        }
        .sun {
            position: fixed;
            top: -40px;
            right: -40px;
            width: 200px;
            height: 200px;
            background: #FF8C00;
            border-radius: 50%;
            box-shadow: 0 0 80px rgba(255,140,0,0.8);
            animation: sunPulse 4s infinite;
            z-index: 0;
        }
        @keyframes sunPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }
        h1 {
            text-align: center;
            font-size: 48px;
            color: #FF8C00;
            text-shadow: 4px 4px 0 #FF5500, 8px 8px 0 rgba(0,0,0,0.5);
            margin-bottom: 20px;
            animation: glow 2s ease-in-out infinite;
        }
        @keyframes glow {
            0%, 100% { text-shadow: 4px 4px 0 #FF5500, 8px 8px 0 rgba(0,0,0,0.5), 0 0 20px rgba(255,140,0,0.5); }
            50% { text-shadow: 4px 4px 0 #FF5500, 8px 8px 0 rgba(0,0,0,0.5), 0 0 40px rgba(255,140,0,0.8); }
        }
        .pets {
            display: flex;
            justify-content: center;
            gap: 60px;
            margin: 40px 0;
        }
        canvas {
            image-rendering: pixelated;
            border: 4px solid #FF8C00;
            background: #0a0400;
        }
        .pet-label {
            font-size: 14px;
            text-align: center;
            color: #FFD700;
            margin-top: 10px;
        }
        .box {
            background: rgba(42, 20, 0, 0.9);
            border: 4px solid #FF8C00;
            padding: 20px;
            margin: 20px 0;
            box-shadow: 4px 4px 0 #FF5500, 8px 8px 0 rgba(0,0,0,0.5);
        }
        .box-title {
            font-size: 16px;
            color: #FF8C00;
            margin-bottom: 15px;
            letter-spacing: 2px;
        }
        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            background: #0a0400;
            border: 3px solid #FF6600;
            color: #fff;
            font-family: 'VT323', monospace;
            font-size: 16px;
        }
        input:focus {
            outline: none;
            border-color: #FFD700;
            box-shadow: 0 0 10px rgba(255,215,0,0.5);
        }
        button {
            background: #FF8C00;
            color: #1a0800;
            border: 3px solid #FF5500;
            padding: 12px 24px;
            font-family: 'Press Start 2P', monospace;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.1s;
        }
        button:hover {
            background: #FF5500;
            transform: translate(2px, 2px);
        }
        button:active {
            transform: translate(4px, 4px);
        }
        .recipe {
            background: #faf4e8;
            color: #2c1a0e;
            padding: 20px;
            margin: 15px 0;
            border: 3px solid #e0d4bc;
            box-shadow: 3px 3px 0 #c8b898;
        }
